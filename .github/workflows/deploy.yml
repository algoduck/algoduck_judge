name: Deploy Algoduck Judge Server to EC2

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      triggerReason:
        description: "Why are you manually deploying?"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install envsubst
        run: sudo apt-get install -y gettext

      - name: Generate .env for Judge Server
        run: |
          cp .env.template .env.template.generated
          envsubst < .env.template.generated > .env
          echo "🔍 생성된 .env 파일 내용:"
          cat .env
        env:
          TESTCASE_BASE_PATH: ${{ secrets.TESTCASE_BASE_PATH }}
          TESTCASE_S3_BUCKET_URL: ${{ secrets.TESTCASE_S3_BUCKET_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: |
            Dockerfile,
            .env,
            app/
          target: "~/algoduck_judge"

      - name: Run Judge server on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/algoduck_judge

            echo "🧹 기존 Judge 컨테이너 정리"
            docker stop judge-server || true
            docker rm judge-server || true

            echo "🚀 Judge 서버 빌드 및 실행"
            docker build -t judge-server .
            
            docker run -d \
              --network="host" \
              --name judge-server \
              --env-file .env \
              -v /home/ubuntu/testcases:/app/testcases \
              -v /home/ubuntu/cache/testcases:/app/cache/testcases \
              judge-server

            echo "📄 Judge 서버 로그 저장"
            sleep 5
            docker logs judge-server > ~/judge-deploy.log || true

      - name: Judge Health Check
        run: |
          echo "🔍 Judge 서버 Health Check 시작"
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://algoduck-judge.duckdns.org/health || true)
            if [ "$status" == "200" ]; then
              echo "✅ Judge 서버 정상 작동 (HTTP 200)"
              exit 0
            fi
            echo "⏳ 대기 중... (현재 상태: $status)"
            sleep 5
          done
          echo "❌ Judge Health Check 실패"
          exit 1
