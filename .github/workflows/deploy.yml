name: Deploy to EC2

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      triggerReason:
        description: "Why are you manually deploying?"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            # 기본 경로로 이동하거나 클론
            cd /home/ubuntu/algoduck_judge || git clone https://github.com/algoduck/algoduck_judge.git algoduck_judge && cd algoduck_judge

            # 최신 develop 브랜치 pull
            git pull origin develop

            # .env 생성
            cp .env.template .env
            echo "TESTCASE_BASE_PATH=/app/testcases" >> .env

            # 기존 컨테이너 정리
            docker stop judge-server || true && docker rm judge-server || true

            # 빌드 및 실행
            docker build -t judge-server .
            docker run -d -p 8000:8000 \
              --name judge-server \
              --env-file .env \
              -v /home/ubuntu/testcases:/app/testcases \
              judge-server
          EOF